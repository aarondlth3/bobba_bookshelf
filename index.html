<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookshelf</title>
    <!-- Iconos y Favicon de la App -->
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/aarondlth3/bobba_bookshelf@main/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/gh/aarondlth3/bobba_bookshelf@main/images/favicon.svg" />
    <link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/aarondlth3/bobba_bookshelf@main/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://cdn.jsdelivr.net/gh/aarondlth3/bobba_bookshelf@main/images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Bookshelf" />
    <link rel="manifest" href="https://cdn.jsdelivr.net/gh/aarondlth3/bobba_bookshelf@main/images/site.webmanifest" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 900: '#14532d' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #16a34a; width: 24px; height: 24px; -webkit-animation: spin 1s linear infinite; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.95); } 
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); } 
        }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="https://raw.githubusercontent.com/aarondlth3/bobba_bookshelf/07297969d12577f03fab52d59711c7cc3000bd1b/images/bookshelf_img.png" alt="Bookshelf Logo" class="h-8 w-8 object-contain">
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">Bookshelf</h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="openModal('bookModal'); resetBookForm()" class="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2">
                    <i class="ph ph-plus-circle text-lg"></i> <span class="hidden sm:inline">Añadir Libro</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 max-w-7xl mx-auto w-full">
        
        <!-- Toolbar: Search & Filters -->
        <div class="flex flex-col sm:flex-row gap-4 mb-8">
            <div class="relative flex-1">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                <input type="text" id="searchInput" placeholder="Buscar por título, autor o género..." class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-shadow" onkeyup="filterBooks()">
            </div>
            <div class="flex gap-2">
                <select id="genreFilter" class="bg-white border border-slate-300 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-500" onchange="filterBooks()">
                    <option value="">Todos los géneros</option>
                </select>
                <select id="langFilter" class="bg-white border border-slate-300 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-500" onchange="filterBooks()">
                    <option value="">Todos los idiomas</option>
                </select>
            </div>
        </div>

        <!-- Initial Loading State -->
        <div id="mainLoader" class="flex flex-col items-center justify-center py-20 hidden">
            <div class="loader w-10 h-10 border-4 border-t-brand-600 mb-4"></div>
            <p class="text-slate-500 font-medium">Sincronizando biblioteca...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <i class="ph ph-books text-6xl text-slate-300 mb-4 block"></i>
            <h3 class="text-lg font-medium text-slate-900 mb-2">Tu biblioteca está vacía</h3>
            <p class="text-slate-500 mb-6 max-w-md mx-auto">Comienza añadiendo tu primer libro. Puedes configurar detalles, subir una portada y agregar versiones o materiales adjuntos.</p>
            <button onclick="openModal('bookModal'); resetBookForm()" class="bg-brand-600 hover:bg-brand-700 text-white px-6 py-2.5 rounded-xl font-medium transition-colors shadow-sm">Añadir mi primer libro</button>
        </div>

        <!-- Books Grid -->
        <div id="booksGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6">
            <!-- Book cards will be injected here -->
        </div>
    </main>

    <!-- TOAST NOTIFICATIONS -->
    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- MODALS -->
    <!-- Overlay -->
    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 hidden transition-opacity" onclick="closeAllModals()"></div>

    <!-- 1. Book Detail Modal -->
    <div id="bookDetailModal" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-2xl shadow-xl z-50 w-full max-w-4xl max-h-[90vh] flex flex-col hidden modal-enter">
        <!-- Injected via JS -->
    </div>

    <!-- 2. Add/Edit Book Form Modal -->
    <div id="bookModal" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-2xl shadow-xl z-50 w-full max-w-lg max-h-[90vh] overflow-y-auto hidden modal-enter">
        <div class="p-5 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white z-10">
            <h2 id="bookModalTitle" class="text-xl font-bold text-slate-800">Añadir Libro</h2>
            <button onclick="closeModal('bookModal')" class="text-slate-400 hover:text-slate-600"><i class="ph ph-x text-xl"></i></button>
        </div>
        <form id="bookForm" onsubmit="handleBookSubmit(event)" class="p-6 space-y-4">
            <input type="hidden" id="bookId">
            <input type="hidden" id="existingThumbnailId">
            
            <!-- Image Upload Area -->
            <div class="flex flex-col items-center gap-3">
                <div id="imagePreviewContainer" class="w-32 h-48 bg-slate-100 rounded-lg border-2 border-dashed border-slate-300 flex items-center justify-center overflow-hidden relative group cursor-pointer" onclick="document.getElementById('bookImage').click()">
                    <img id="bookImagePreview" src="" class="w-full h-full object-cover hidden" alt="Preview">
                    <div id="imagePlaceholder" class="text-center p-2">
                        <i class="ph ph-image text-3xl text-slate-400 mb-1"></i>
                        <p class="text-[10px] text-slate-500 uppercase tracking-wide font-semibold">Subir Portada</p>
                    </div>
                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="ph ph-arrows-clockwise text-white text-2xl"></i>
                    </div>
                </div>
                <input type="file" id="bookImage" accept="image/*" class="hidden" onchange="handleImageSelect(event)">
                <p class="text-xs text-slate-400">Se redimensionará automáticamente.</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Título *</label>
                <input type="text" id="bookTitle" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Autor(es) * <span class="text-xs font-normal text-slate-400">(Separados por coma)</span></label>
                <input type="text" id="bookAuthor" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Género principal *</label>
                <input type="text" id="bookGenre" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Descripción</label>
                <textarea id="bookDesc" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none resize-none"></textarea>
            </div>
            
            <div class="pt-4 flex justify-end gap-3">
                <button type="button" onclick="closeModal('bookModal')" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg font-medium">Cancelar</button>
                <button type="submit" id="btnSaveBook" class="px-6 py-2 bg-brand-600 text-white rounded-lg font-medium hover:bg-brand-700 flex items-center gap-2">
                    <span>Guardar</span>
                </button>
            </div>
        </form>
    </div>

    <!-- 4. Add/Edit Item Modal (Shared for Version & Material) -->
    <div id="itemModal" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-2xl shadow-xl z-50 w-full max-w-md hidden modal-enter">
        <div class="p-5 border-b border-slate-100 flex justify-between items-center">
            <h2 id="itemModalTitle" class="text-lg font-bold text-slate-800">Añadir</h2>
            <button onclick="closeModal('itemModal')" class="text-slate-400 hover:text-slate-600"><i class="ph ph-x text-xl"></i></button>
        </div>
        <form id="itemForm" onsubmit="handleItemSubmit(event)" class="p-5 space-y-4">
            <input type="hidden" id="itemType"> <!-- 'version' or 'material' -->
            <input type="hidden" id="itemId">
            <input type="hidden" id="itemParentId">

            <div id="versionFields" class="space-y-4 hidden">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Idioma *</label>
                        <select id="vLang" class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-brand-500">
                            <option value="Español">Español</option>
                            <option value="Inglés">Inglés</option>
                            <option value="Francés">Francés</option>
                            <option value="Otros">Otros</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Formato *</label>
                        <select id="vFormat" class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-brand-500">
                            <option value="PDF">PDF</option>
                            <option value="EPUB">EPUB</option>
                            <option value="MOBI">MOBI</option>
                            <option value="Físico">Físico</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Enlace de Drive *</label>
                    <input type="url" id="vLink" class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-brand-500" placeholder="https://drive.google.com/...">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">ISBN</label>
                        <input type="text" id="vIsbn" class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-brand-500 text-sm" placeholder="Ej: 978-3-16-148410-0">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Año / Fecha</label>
                        <input type="text" id="vDate" class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-brand-500 text-sm" placeholder="Ej: 2024">
                    </div>
                </div>
            </div>

            <div id="materialFields" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Tipo de Material *</label>
                    <select id="mType" class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-brand-500">
                        <option value="md_zip">Notas (Markdown ZIP)</option>
                        <option value="txt_zip">Notas (TXT ZIP)</option>
                        <option value="audio_drive_folder">Carpeta Audio (Drive)</option>
                        <option value="notion_link">Página de Notion</option>
                        <option value="other">Otro</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Título *</label>
                    <input type="text" id="mTitle" class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-brand-500" placeholder="Ej: Notas Capítulo 1">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Enlace *</label>
                    <input type="url" id="mLink" class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-brand-500" placeholder="URL...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Descripción</label>
                    <input type="text" id="mDesc" class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-brand-500">
                </div>
            </div>

            <div class="pt-2 flex justify-end gap-3">
                <button type="button" onclick="closeModal('itemModal')" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg font-medium">Cancelar</button>
                <button type="submit" id="btnSaveItem" class="px-6 py-2 bg-brand-600 text-white rounded-lg font-medium hover:bg-brand-700 flex items-center gap-2">
                    <span>Guardar</span>
                </button>
            </div>
        </form>
    </div>

    <!-- Scripts -->
    <script>
        // --- STATE & CONFIG ---
        const APP_STATE = {
            publications: [], versions: [], materials: [],
            pendingImage: null, currentBookId: null, isFetching: false
        };

        function getWebAppUrl() { 
            return 'https://script.google.com/macros/s/AKfycbxgvZYAsGV6y_WKdZHSDORfBLrT70TcXqRgTLnWvk5wZLQPSzYgtx6F-NIS-uzMotV0/exec'; 
        }

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
        });

        // --- API HELPERS ---
        async function apiCall(action, payload = {}) {
            const url = getWebAppUrl();
            if (!url) throw new Error("URL no configurada");
            
            const bodyData = { action, ...payload };
            
            try {
                // Simplificamos la petición. Al enviar una cadena, el navegador 
                // usa 'text/plain' por defecto, evitando el preflight de CORS.
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify(bodyData)
                });
                
                if (!response.ok) {
                    throw new Error(`Error del servidor: ${response.status}`);
                }
                
                const result = await response.json();
                if (result.status === 'error') throw new Error(result.message);
                return result.data;
            } catch (error) {
                console.error("API Error:", error);
                throw new Error("Error de conexión. Verifica que el Apps Script esté implementado con acceso para 'Cualquier persona'.");
            }
        }

        async function fetchData() {
            if (APP_STATE.isFetching) return;
            APP_STATE.isFetching = true;
            toggleMainLoader(true);
            
            try {
                const data = await apiCall('getAllData');
                APP_STATE.publications = data.publications || [];
                APP_STATE.versions = data.versions || [];
                APP_STATE.materials = data.materials || [];
                
                updateFilters();
                renderBooks();
                showToast("Biblioteca sincronizada", "success");
            } catch (error) {
                showToast(error.message, "error");
            } finally {
                toggleMainLoader(false);
                APP_STATE.isFetching = false;
            }
        }

        // --- UI RENDERING ---
        function toggleMainLoader(show) {
            document.getElementById('mainLoader').classList.toggle('hidden', !show);
            document.getElementById('booksGrid').classList.toggle('hidden', show);
            document.getElementById('emptyState').classList.add('hidden');
        }

        function getDriveImageUrl(thumbnailId) {
            if (!thumbnailId) return null;
            return `https://drive.google.com/thumbnail?id=${thumbnailId}&sz=w600`;
        }

        function getDirectDownloadLink(link) {
            if (!link) return '';
            if (link.includes('uc?export=')) return link;
            const match = link.match(/\/d\/(.+?)\//);
            if (match && match[1]) {
                return `https://drive.google.com/uc?export=download&id=${match[1]}`;
            }
            return link;
        }

        function renderBooks() {
            const grid = document.getElementById('booksGrid');
            const empty = document.getElementById('emptyState');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const genre = document.getElementById('genreFilter').value;
            const lang = document.getElementById('langFilter').value;

            grid.innerHTML = '';

            let filtered = APP_STATE.publications.filter(p => {
                const matchSearch = (p.title||'').toLowerCase().includes(search) || (p.author||'').toLowerCase().includes(search);
                const matchGenre = genre === "" || p.genre === genre;
                
                // Lang filter needs checking versions
                let matchLang = true;
                if (lang !== "") {
                    const pubVersions = APP_STATE.versions.filter(v => v.publication_id === p.publication_id);
                    matchLang = pubVersions.some(v => v.language === lang);
                }

                return matchSearch && matchGenre && matchLang;
            });

            if (filtered.length === 0 && APP_STATE.publications.length === 0 && !search && !genre && !lang) {
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
            }

            filtered.forEach(pub => {
                const imgUrl = getDriveImageUrl(pub.thumbnailId);
                const imgSrc = imgUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(pub.title)}&background=f1f5f9&color=64748b&size=400&font-size=0.3`;

                const card = document.createElement('div');
                // Se agregó aspect-[2/3] para proporciones de libro real y se quitó el div contenedor de textos
                card.className = "bg-slate-200 rounded-lg sm:rounded-xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl transition-all duration-300 cursor-pointer relative group aspect-[2/3]";
                card.onclick = () => openBookDetail(pub.publication_id);
                
                card.innerHTML = `
                    <img src="${imgSrc}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="${pub.title}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(pub.title)}&background=f87171&color=fff'">
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors duration-300"></div>
                `;
                grid.appendChild(card);
            });
        }

        function updateFilters() {
            const genres = [...new Set(APP_STATE.publications.map(p => p.genre).filter(Boolean))].sort();
            const langs = [...new Set(APP_STATE.versions.map(v => v.language).filter(Boolean))].sort();

            const genreSelect = document.getElementById('genreFilter');
            const currentGenre = genreSelect.value;
            genreSelect.innerHTML = '<option value="">Todos los géneros</option>' + 
                genres.map(g => `<option value="${g}">${g}</option>`).join('');
            genreSelect.value = currentGenre;

            const langSelect = document.getElementById('langFilter');
            const currentLang = langSelect.value;
            langSelect.innerHTML = '<option value="">Todos los idiomas</option>' + 
                langs.map(l => `<option value="${l}">${l}</option>`).join('');
            langSelect.value = currentLang;
        }

        function filterBooks() { renderBooks(); }

        // --- BOOK DETAIL MODAL ---
        function openBookDetail(id) {
            const pub = APP_STATE.publications.find(p => p.publication_id === id);
            if (!pub) return;
            APP_STATE.currentBookId = id;

            const modal = document.getElementById('bookDetailModal');
            const imgUrl = getDriveImageUrl(pub.thumbnailId) || `https://ui-avatars.com/api/?name=${encodeURIComponent(pub.title)}&background=f1f5f9&color=64748b&size=400`;

            modal.innerHTML = `
                <!-- Header part -->
                <div class="flex flex-col sm:flex-row gap-6 p-6 md:p-8 bg-slate-50 rounded-t-2xl relative">
                    <button onclick="closeModal('bookDetailModal')" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center bg-white rounded-full shadow-sm text-slate-400 hover:text-slate-700"><i class="ph ph-x"></i></button>
                    
                    <div class="w-32 h-48 sm:w-40 sm:h-56 flex-shrink-0 rounded-xl overflow-hidden shadow-md bg-white border border-slate-200">
                        <img src="${imgUrl}" class="w-full h-full object-cover" alt="Cover">
                    </div>
                    
                    <div class="flex-1 flex flex-col">
                        <div class="flex flex-wrap gap-2 mb-2">
                            <span class="px-2.5 py-1 rounded-full bg-brand-100 text-brand-700 text-xs font-semibold">${pub.genre}</span>
                        </div>
                        <h2 class="text-2xl md:text-3xl font-bold text-slate-900 leading-tight mb-2">${pub.title}</h2>
                        <p class="text-lg text-slate-600 mb-4 font-medium">${pub.author}</p>
                        ${pub.description ? `<p class="text-sm text-slate-500 line-clamp-3 mb-4">${pub.description}</p>` : ''}
                        
                        <div class="mt-auto flex gap-3">
                            <button onclick="editBook('${pub.publication_id}')" class="px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm font-medium hover:bg-slate-50 transition-colors flex items-center gap-2"><i class="ph ph-pencil-simple"></i> Editar</button>
                            <button onclick="deleteBook('${pub.publication_id}')" class="px-4 py-2 bg-white border border-red-200 text-red-600 rounded-lg text-sm font-medium hover:bg-red-50 transition-colors flex items-center gap-2"><i class="ph ph-trash"></i> Eliminar</button>
                        </div>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="flex border-b border-slate-200 px-6 mt-2">
                    <button onclick="switchTab('versions')" id="tab-versions" class="px-4 py-3 border-b-2 border-brand-500 text-brand-600 font-medium text-sm flex items-center gap-2 transition-colors"><i class="ph ph-files"></i> Versiones</button>
                    <button onclick="switchTab('materials')" id="tab-materials" class="px-4 py-3 border-b-2 border-transparent text-slate-500 hover:text-slate-700 font-medium text-sm flex items-center gap-2 transition-colors"><i class="ph ph-folder-notch"></i> Materiales</button>
                </div>

                <!-- Tab Content -->
                <div class="p-6 overflow-y-auto flex-1 bg-white rounded-b-2xl" id="tabContentArea">
                    <!-- Injected via JS -->
                </div>
            `;

            openModal('bookDetailModal');
            switchTab('versions');
        }

        function switchTab(tabName) {
            document.getElementById('tab-versions').className = `px-4 py-3 border-b-2 font-medium text-sm flex items-center gap-2 transition-colors ${tabName === 'versions' ? 'border-brand-500 text-brand-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`;
            document.getElementById('tab-materials').className = `px-4 py-3 border-b-2 font-medium text-sm flex items-center gap-2 transition-colors ${tabName === 'materials' ? 'border-brand-500 text-brand-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`;
            
            const area = document.getElementById('tabContentArea');
            area.innerHTML = '';

            const id = APP_STATE.currentBookId;

            if (tabName === 'versions') {
                const versions = APP_STATE.versions.filter(v => v.publication_id === id);
                let html = `
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-slate-800">Archivos y Ediciones</h3>
                        <button onclick="openItemModal('version', null, '${id}')" class="text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg font-medium flex items-center gap-1 transition-colors"><i class="ph ph-plus"></i> Añadir versión</button>
                    </div>
                `;
                
                if (versions.length === 0) {
                    html += `<p class="text-slate-400 text-sm italic py-4 text-center">No hay versiones registradas.</p>`;
                } else {
                    html += `<div class="space-y-3">`;
                    versions.forEach(v => {
                        const dlLink = getDirectDownloadLink(v.file_drive_link);
                        
                        // Extracción segura del ID en caso de espacios ocultos en Google Sheets
                        const vIdKey = Object.keys(v).find(k => k.trim().toLowerCase() === 'version_id') || 'version_id';
                        const vId = v[vIdKey];

                        // Construir el título: Nombre (si hay de versiones viejas) + Año + ISBN
                        let titleParts = [];
                        if (v.file_name && String(v.file_name).trim() !== '') titleParts.push(v.file_name);
                        if (v.publication_date && String(v.publication_date).trim() !== '') titleParts.push(v.publication_date);
                        if (v.isbn && String(v.isbn).trim() !== '') titleParts.push('ISBN: ' + v.isbn);
                        
                        let mainTitle = titleParts.length > 0 ? titleParts.join(' • ') : 'Edición sin detalles';

                        html += `
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-slate-50 border border-slate-100 rounded-xl gap-4 hover:shadow-sm transition-shadow">
                                <div>
                                    <div class="flex flex-wrap items-center gap-2 mb-1">
                                        <span class="px-2 py-0.5 bg-white border border-slate-200 rounded text-[10px] font-bold text-slate-600">${v.format}</span>
                                        <span class="font-semibold text-slate-800 text-sm">${mainTitle}</span>
                                    </div>
                                    <div class="text-xs text-slate-500 flex gap-3">
                                        <span><i class="ph ph-translate"></i> Idioma: ${v.language}</span>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    ${v.file_drive_link ? `
                                        <a href="${dlLink}" class="w-8 h-8 flex items-center justify-center bg-white border border-slate-200 rounded-lg text-slate-600 hover:text-brand-600 hover:border-brand-200 transition-colors" title="Descargar Directo"><i class="ph ph-download-simple"></i></a>
                                        <a href="${v.file_drive_link}" target="_blank" class="w-8 h-8 flex items-center justify-center bg-white border border-slate-200 rounded-lg text-slate-600 hover:text-blue-600 hover:border-blue-200 transition-colors" title="Abrir en Drive"><i class="ph ph-google-logo"></i></a>
                                    ` : ''}
                                    <button onclick="editItem('version', '${vId}')" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-slate-700"><i class="ph ph-pencil-simple"></i></button>
                                    <button onclick="deleteItem('version', '${vId}')" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-red-500"><i class="ph ph-trash"></i></button>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                area.innerHTML = html;

            } else if (tabName === 'materials') {
                const materials = APP_STATE.materials.filter(m => m.publication_id === id);
                let html = `
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-slate-800">Recursos Adicionales</h3>
                        <button onclick="openItemModal('material', null, '${id}')" class="text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg font-medium flex items-center gap-1 transition-colors"><i class="ph ph-plus"></i> Añadir material</button>
                    </div>
                `;
                
                if (materials.length === 0) {
                    html += `<p class="text-slate-400 text-sm italic py-4 text-center">No hay materiales de trabajo registrados.</p>`;
                } else {
                    html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-3">`;
                    materials.forEach(m => {
                        let icon = 'ph-file';
                        let color = 'text-slate-500';
                        if(m.material_type.includes('zip')) { icon = 'ph-file-zip'; color = 'text-amber-500'; }
                        else if(m.material_type.includes('audio')) { icon = 'ph-headphones'; color = 'text-purple-500'; }
                        else if(m.material_type.includes('notion')) { icon = 'ph-notebook'; color = 'text-slate-800'; }

                        const linkAction = (m.material_type.includes('zip')) ? getDirectDownloadLink(m.link) : m.link;

                        // Extracción segura de ID
                        const mIdKey = Object.keys(m).find(k => k.trim().toLowerCase() === 'material_id') || 'material_id';
                        const mId = m[mIdKey];

                        html += `
                            <div class="flex items-start gap-3 p-4 bg-white border border-slate-200 rounded-xl hover:border-brand-300 transition-colors">
                                <div class="w-10 h-10 rounded-lg bg-slate-50 flex items-center justify-center flex-shrink-0 border border-slate-100">
                                    <i class="ph ${icon} text-xl ${color}"></i>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <h4 class="font-semibold text-sm text-slate-800 truncate">${m.material_title}</h4>
                                    ${m.description ? `<p class="text-[11px] text-slate-500 mt-0.5 line-clamp-1">${m.description}</p>` : ''}
                                    <div class="flex items-center gap-3 mt-2">
                                        <a href="${linkAction}" target="_blank" class="text-[11px] font-medium text-brand-600 hover:text-brand-800 flex items-center gap-1">
                                            ${m.material_type.includes('zip') ? '<i class="ph ph-download-simple"></i> Descargar' : '<i class="ph ph-arrow-square-out"></i> Abrir'}
                                        </a>
                                        <button onclick="editItem('material', '${mId}')" class="text-[11px] text-slate-400 hover:text-slate-700">Editar</button>
                                        <button onclick="deleteItem('material', '${mId}')" class="text-[11px] text-slate-400 hover:text-red-500">Eliminar</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                area.innerHTML = html;
            }
        }


        // --- FORM HANDLING (BOOK) ---
        function resetBookForm() {
            document.getElementById('bookForm').reset();
            document.getElementById('bookId').value = '';
            document.getElementById('existingThumbnailId').value = '';
            APP_STATE.pendingImage = null;
            document.getElementById('bookModalTitle').innerText = 'Añadir Libro';
            
            // Reset image preview
            document.getElementById('bookImagePreview').src = '';
            document.getElementById('bookImagePreview').classList.add('hidden');
            document.getElementById('imagePlaceholder').classList.remove('hidden');
        }

        function editBook(id) {
            const pub = APP_STATE.publications.find(p => p.publication_id === id);
            if (!pub) return;
            
            resetBookForm();
            document.getElementById('bookModalTitle').innerText = 'Editar Libro';
            document.getElementById('bookId').value = pub.publication_id;
            document.getElementById('bookTitle').value = pub.title;
            document.getElementById('bookAuthor').value = pub.author;
            document.getElementById('bookGenre').value = pub.genre;
            document.getElementById('bookDesc').value = pub.description || '';
            document.getElementById('existingThumbnailId').value = pub.thumbnailId || '';

            if (pub.thumbnailId) {
                const preview = document.getElementById('bookImagePreview');
                preview.src = getDriveImageUrl(pub.thumbnailId);
                preview.classList.remove('hidden');
                document.getElementById('imagePlaceholder').classList.add('hidden');
            }
            
            closeModal('bookDetailModal');
            openModal('bookModal');
        }

        async function handleBookSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSaveBook');
            const originalContent = btn.innerHTML;
            setLoadingBtn(btn, true);

            const payload = {
                publication_id: document.getElementById('bookId').value,
                title: document.getElementById('bookTitle').value,
                author: document.getElementById('bookAuthor').value,
                genre: document.getElementById('bookGenre').value,
                description: document.getElementById('bookDesc').value,
                thumbnailId: document.getElementById('existingThumbnailId').value
            };

            if (APP_STATE.pendingImage) {
                payload.imageBase64 = APP_STATE.pendingImage.data;
                payload.imageName = APP_STATE.pendingImage.name;
            }

            try {
                const action = payload.publication_id ? 'updatePublication' : 'createPublication';
                await apiCall(action, { data: payload });
                showToast("Libro guardado correctamente", "success");
                closeModal('bookModal');
                fetchData(); // Reload all to get new IDs/URLs
            } catch (error) {
                showToast(error.message, "error");
            } finally {
                setLoadingBtn(btn, false, originalContent);
            }
        }

        async function deleteBook(id) {
            if (!confirm("¿Estás seguro de eliminar este libro y todas sus versiones/materiales? Esta acción no se puede deshacer.")) return;
            
            closeModal('bookDetailModal');
            try {
                await apiCall('deletePublication', { id });
                showToast("Libro eliminado", "success");
                fetchData();
            } catch (error) {
                showToast("Error al eliminar", "error");
            }
        }

        // --- IMAGE HANDLING (CANVAS) ---
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.type.match('image.*')) {
                showToast("Por favor selecciona una imagen válida", "error");
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max = 400; // Max edge size

                    if (width > height) {
                        if (width > max) { height *= max / width; width = max; }
                    } else {
                        if (height > max) { width *= max / height; height = max; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6); // Compress
                    
                    // Update Preview
                    const preview = document.getElementById('bookImagePreview');
                    preview.src = dataUrl;
                    preview.classList.remove('hidden');
                    document.getElementById('imagePlaceholder').classList.add('hidden');

                    // Store base64 data (strip prefix)
                    APP_STATE.pendingImage = {
                        data: dataUrl.split(',')[1],
                        name: file.name
                    };
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // --- FORM HANDLING (ITEMS: VERSIONS/MATERIALS) ---
        function openItemModal(type, itemId = null, parentId = null) {
            document.getElementById('itemForm').reset();
            document.getElementById('itemType').value = type;
            document.getElementById('itemId').value = itemId || '';
            document.getElementById('itemParentId').value = parentId || APP_STATE.currentBookId;
            
            document.getElementById('versionFields').classList.add('hidden');
            document.getElementById('materialFields').classList.add('hidden');
            
            document.getElementById(`${type}Fields`).classList.remove('hidden');

            // Make fields required based on type
            const isV = type === 'version';
            document.getElementById('vLang').required = isV;
            document.getElementById('vLink').required = isV;
            document.getElementById('mTitle').required = !isV;
            document.getElementById('mLink').required = !isV;

            document.getElementById('itemModalTitle').innerText = itemId ? `Editar ${type === 'version' ? 'Versión' : 'Material'}` : `Añadir ${type === 'version' ? 'Versión' : 'Material'}`;
            
            openModal('itemModal');
        }

        function editItem(type, id) {
            const list = type === 'version' ? APP_STATE.versions : APP_STATE.materials;
            
            // Búsqueda segura del ID
            const idKeyBase = type === 'version' ? 'version_id' : 'material_id';
            const item = list.find(i => {
                const dynamicKey = Object.keys(i).find(k => k.trim().toLowerCase() === idKeyBase) || idKeyBase;
                return String(i[dynamicKey]) === String(id);
            });
            
            if (!item) return;

            openItemModal(type, id, item.publication_id);

            if (type === 'version') {
                // Selecciona el idioma o recurre a "Español" por defecto si estaba vacío
                const langSelect = document.getElementById('vLang');
                const validOptions = Array.from(langSelect.options).map(opt => opt.value);
                langSelect.value = validOptions.includes(item.language) ? item.language : (item.language ? 'Otros' : 'Español');
                
                document.getElementById('vFormat').value = item.format || 'PDF';
                document.getElementById('vLink').value = item.file_drive_link || '';
                document.getElementById('vIsbn').value = item.isbn || '';
                document.getElementById('vDate').value = item.publication_date || '';
            } else {
                document.getElementById('mType').value = item.material_type || 'other';
                document.getElementById('mTitle').value = item.material_title || '';
                document.getElementById('mLink').value = item.link || '';
                document.getElementById('mDesc').value = item.description || '';
            }
        }

        async function handleItemSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSaveItem');
            const originalContent = btn.innerHTML;
            setLoadingBtn(btn, true);

            const type = document.getElementById('itemType').value;
            const action = document.getElementById('itemId').value ? `update${type.charAt(0).toUpperCase() + type.slice(1)}` : `create${type.charAt(0).toUpperCase() + type.slice(1)}`;
            
            let payload = {
                id: document.getElementById('itemId').value,
                publication_id: document.getElementById('itemParentId').value
            };

            if (type === 'version') {
                payload = { ...payload,
                    language: document.getElementById('vLang').value,
                    format: document.getElementById('vFormat').value,
                    file_drive_link: document.getElementById('vLink').value,
                    isbn: document.getElementById('vIsbn').value,
                    publication_date: document.getElementById('vDate').value,
                    file_name: '', notes: ''
                };
            } else {
                payload = { ...payload,
                    material_type: document.getElementById('mType').value,
                    material_title: document.getElementById('mTitle').value,
                    link: document.getElementById('mLink').value,
                    description: document.getElementById('mDesc').value
                };
            }

            try {
                await apiCall(action, { data: payload });
                showToast("Guardado correctamente", "success");
                closeModal('itemModal');
                await fetchData(); 
                if(document.getElementById('bookDetailModal').classList.contains('hidden') === false) {
                     switchTab(type === 'version' ? 'versions' : 'materials');
                }
            } catch (error) {
                showToast(error.message, "error");
            } finally {
                setLoadingBtn(btn, false, originalContent);
            }
        }

        async function deleteItem(type, id) {
            console.log("Intentando eliminar:", type, "con ID:", id); // Para debug en consola
            if (!id || id === 'undefined') {
                showToast("Error: ID del item no encontrado. Contacta soporte o verifica recargando la página.", "error");
                return;
            }
            
            if (!confirm(`¿Estás seguro de eliminar este ${type === 'version' ? 'archivo' : 'material'}?`)) return;
            
            const action = `delete${type.charAt(0).toUpperCase() + type.slice(1)}`;
            try {
                await apiCall(action, { id });
                showToast("Eliminado correctamente", "success");
                await fetchData();
                switchTab(type === 'version' ? 'versions' : 'materials');
            } catch (error) {
                console.error(error);
                showToast("Error al eliminar: " + error.message, "error");
            }
        }

        // --- SETTINGS & UTILS ---
        function openModal(id) {
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.getElementById(id).classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            // Only hide overlay if no other modals are open
            const openModals = document.querySelectorAll('.modal-enter:not(.hidden)');
            if (openModals.length === 0) {
                document.getElementById('modalOverlay').classList.add('hidden');
                document.body.style.overflow = '';
            }
        }

        function closeAllModals() {
            ['bookDetailModal', 'bookModal', 'itemModal'].forEach(closeModal);
            document.getElementById('modalOverlay').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function setLoadingBtn(btn, isLoading, originalHtml = '') {
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = `<div class="loader w-4 h-4 border-2 border-white/30 border-t-white"></div> Procesando...`;
                btn.classList.add('opacity-75', 'cursor-not-allowed');
            } else {
                btn.disabled = false;
                btn.innerHTML = originalHtml;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const colors = {
                success: 'bg-green-50 text-green-800 border-green-200',
                error: 'bg-red-50 text-red-800 border-red-200',
                info: 'bg-blue-50 text-blue-800 border-blue-200'
            };
            const icons = {
                success: '<i class="ph ph-check-circle text-lg text-green-500"></i>',
                error: '<i class="ph ph-warning-circle text-lg text-red-500"></i>',
                info: '<i class="ph ph-info text-lg text-blue-500"></i>'
            };

            toast.className = `flex items-center gap-2 px-4 py-3 rounded-lg border shadow-sm text-sm font-medium transition-all duration-300 transform translate-y-full opacity-0 ${colors[type]}`;
            toast.innerHTML = `${icons[type]} <span>${message}</span>`;
            
            container.appendChild(toast);
            
            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-full', 'opacity-0');
            });

            // Animate out
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

    </script>
