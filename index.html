<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookshelf</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap');
    
    @keyframes pulse-slow { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    .animate-pulse-slow { animation: pulse-slow 3s infinite; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    
    #desktop-sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .sidebar-collapsed { width: 5rem !important; }
    .sidebar-collapsed .nav-text { display: none; }
    .sidebar-collapsed .nav-icon { margin: 0 auto; }
    .sidebar-collapsed .brand-text { display: none !important; }
    .sidebar-collapsed .collapsed-only-icon { display: block !important; margin: 0 auto; }
    .sidebar-collapsed .brand-container { justify-content: center !important; }

    /* SHIMMER */
    .book-cover-wrapper {
      position: relative;
      overflow: hidden;
      background: #1e2937;
      border-radius: 8px;
    }
    .book-cover-wrapper::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 40%;
      height: 300%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: shimmer 1.8s infinite linear;
      transform: skewX(-20deg);
    }
    @keyframes shimmer { 100% { transform: translateX(280%); } }
    .book-cover-wrapper img { transition: opacity 0.4s ease; }
    .book-cover-wrapper.loading img { opacity: 0; }
  </style>
</head>
<body class="bg-black text-slate-100 h-screen overflow-hidden selection:bg-indigo-500 selection:text-white flex flex-col" style="font-family: 'Century Gothic', 'CenturyGothic', 'Montserrat', Arial, sans-serif;">

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycby6Yuv5yEUIYw8DK6O75sYVPlu2sM9mTO6hXN8j4jsH0VJ1m2CCaPr0Rm-END-6k3hGXQ/exec";
    const FALLBACK_IMAGE = 'https://images.unsplash.com/photo-1543002588-bfa74002ed7e?auto=format&fit=crop&w=400&q=80';
  </script>

  <!-- TODO EL HTML ANTERIOR (sidebar, main, footer, modal, etc.) se mantiene igual -->
  <!-- Solo cambia la parte del <script> final -->

  <script>
    // ==========================================
    // FUNCIÓN ROBUSTA PARA PORTADAS DE DRIVE
    // ==========================================
    function getCoverUrl(coverId) {
      if (!coverId) return FALLBACK_IMAGE;

      const baseId = coverId.includes('id=') ? coverId.split('id=')[1] : coverId;

      const urls = [
        `https://lh3.googleusercontent.com/d/${baseId}`,
        `https://lh3.googleusercontent.com/d/${baseId}=w800-h1200`,
        `https://drive.google.com/thumbnail?id=${baseId}&sz=w800-h1200`,
        `https://drive.google.com/uc?id=${baseId}&export=view`
      ];

      return urls;
    }

    // Carga la imagen intentando varias URLs
    function loadImageWithFallback(imgElement, coverId) {
      const urls = getCoverUrl(coverId);
      let index = 0;

      function tryNextUrl() {
        if (index >= urls.length) {
          imgElement.src = FALLBACK_IMAGE;
          imgElement.parentElement.classList.remove('loading');
          return;
        }
        
        imgElement.src = urls[index];
        index++;
      }

      imgElement.onerror = tryNextUrl;
      imgElement.onload = () => {
        imgElement.parentElement.classList.remove('loading');
      };

      tryNextUrl();
    }

    // ==========================================
    // RENDER BOOK CARD
    // ==========================================
    function renderBookCard(book) {
      return `
        <div class="group cursor-pointer bg-slate-900/40 hover:bg-slate-800/80 p-3 rounded-xl transition-all duration-300 border border-transparent hover:border-slate-700" onclick="openBookDetail('${book.id}')">
          <div class="book-cover-wrapper aspect-[2/3] mb-3 shadow-lg overflow-hidden loading">
            <img 
              loading="lazy"
              class="w-full h-full object-cover"
              alt="${book.title}">
          </div>
          <h3 class="font-bold text-sm truncate text-white">${book.title}</h3>
          <p class="text-[11px] text-slate-400 truncate mt-0.5">${book.author || 'Autor Desconocido'}</p>
          <p class="text-[10px] text-slate-500 mt-1 font-mono">${book.chapters ? book.chapters.length : 0} Capítulos</p>
        </div>
      `;
    }

    // ==========================================
    // OPEN BOOK DETAIL
    // ==========================================
    function openBookDetail(bookId) {
      state.currentBookId = bookId;
      const book = state.books.find(b => b.id === bookId);
      if (!book) return;

      document.getElementById('detail-title').textContent = book.title;
      document.getElementById('detail-author').textContent = book.author || 'Autor Desconocido';
      document.getElementById('detail-collection').textContent = book.collection || 'General';

      const coverImg = document.getElementById('detail-cover');
      loadImageWithFallback(coverImg, book.cover);

      updateChecklistIcons(book.checklist);
      renderAvailableContents(book);
      renderChapters(book);
      navigate('book-detail');
    }

    // ==========================================
    // RENDER LIBRARY (llama a renderBookCard)
    // ==========================================
    function renderLibrary() {
      const container = document.getElementById('library-container');
      container.innerHTML = '';

      if (state.books.length === 0) {
        container.innerHTML = `<div class="text-center py-24 text-slate-500">La biblioteca está vacía.</div>`;
        return;
      }

      const collections = [...new Set(state.books.map(b => b.collection || 'General'))];
      const datalist = document.getElementById('collection-list');
      if (datalist) datalist.innerHTML = collections.map(c => `<option value="${c}">`).join('');

      collections.forEach(col => {
        const booksInCol = state.books.filter(b => (b.collection || 'General') === col);
        const section = document.createElement('div');
        section.className = "mb-8";
        section.innerHTML = `
          <h3 class="text-xs font-bold text-slate-400 mb-4 border-b border-slate-900 pb-2 tracking-wider uppercase">${col}</h3>
          <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6">
            ${booksInCol.map(book => renderBookCard(book)).join('')}
          </div>
        `;
        container.appendChild(section);
      });

      // Aplicar carga de imágenes después de renderizar
      setTimeout(() => {
        document.querySelectorAll('.book-cover-wrapper img').forEach(img => {
          const bookId = img.closest('[onclick^="openBookDetail"]').getAttribute('onclick').match(/'([^']+)'/)[1];
          const book = state.books.find(b => b.id === bookId);
          if (book) loadImageWithFallback(img, book.cover);
        });
      }, 100);
    }

    // ==========================================
    // El resto del script (cargarBiblioteca, reproductor, etc.) se mantiene igual
    // Copia desde aquí el resto de tu script anterior (navigate, fetchWithRetry, subirArchivoFragmentadoReal, etc.)
    // ==========================================

    window.onload = async function() {
      await cargarBiblioteca();
      navigate('library');
    }
  </script>
</body>
</html>
