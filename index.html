<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bobba Bookshelf - Audios</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 15px;
      background: #f4f4f4;
    }
    h1 { 
      text-align: center; 
      color: #333; 
      margin-bottom: 10px;
    }
    .audio-item {
      background: white;
      padding: 15px;
      margin: 12px 0;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .audio-item h3 {
      margin: 0 0 10px 0;
      font-size: 1.15em;
      color: #222;
    }
    audio {
      width: 100%;
      margin-top: 8px;
    }
    .status {
      text-align: center;
      margin: 15px 0;
      font-weight: bold;
      padding: 12px;
      border-radius: 8px;
    }
    button {
      padding: 10px 20px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    small {
      color: #666;
      display: block;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <h1>📚 Bobba Bookshelf</h1>
  <p class="status" id="status">Cargando audios...</p>

  <div id="audioList"></div>

  <script>
    // NUEVA URL ACTUALIZADA
    const API_URL = "https://script.google.com/macros/s/AKfycbyda33qmHWXEM9UB4nO3GG0t4n3-Qq5pBTmZqyqEOu6dfIyhMvhJXcD-tvQiKhyyGLdDQ/exec";

    async function cargarAudios() {
      const status = document.getElementById('status');
      const list = document.getElementById('audioList');
      
      try {
        status.textContent = "Cargando audios desde Google Drive...";
        status.style.background = "#e8f0fe";
        status.style.color = "#1a73e8";

        const response = await fetch(API_URL + '?action=getAudios');
        const data = await response.json();

        if (!data.success) {
          throw new Error(data.error || "Error al obtener los audios");
        }

        list.innerHTML = '';

        if (data.audios.length === 0) {
          list.innerHTML = '<p style="text-align:center; color:#666;">No hay audios en la carpeta.</p>';
          status.textContent = "No se encontraron audios";
          return;
        }

        data.audios.forEach(audio => {
          const div = document.createElement('div');
          div.className = 'audio-item';
          div.innerHTML = `
            <h3>${audio.title}</h3>
            <audio controls preload="metadata">
              <source src="${audio.directLink}" type="audio/mp4">
              <source src="${audio.directLink}" type="audio/mpeg">
              Tu navegador no soporta reproducción de audio.
            </audio>
            <small>Archivo: ${audio.name}</small>
          `;
          list.appendChild(div);
        });

        status.textContent = `✅ ${data.count} audios cargados correctamente`;
        status.style.background = "#e6f4ea";
        status.style.color = "#137333";

      } catch (error) {
        console.error(error);
        status.innerHTML = `❌ Error: ${error.message}<br><br>
                            <button onclick="cargarAudios()">Reintentar</button>`;
        status.style.background = "#fce8e6";
        status.style.color = "#c5221f";
      }
    }

    // Cargar automáticamente
    window.onload = cargarAudios;
  </script>
</body>
</html>
