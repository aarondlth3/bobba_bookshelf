<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bobba Bookshelf - Audios</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 15px;
      background: #f4f4f4;
    }
    h1 { text-align: center; color: #333; }
    .audio-item {
      background: white;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .audio-item h3 {
      margin: 0 0 8px 0;
      font-size: 1.1em;
    }
    audio {
      width: 100%;
      margin-top: 8px;
    }
    .status {
      text-align: center;
      margin: 10px 0;
      font-weight: bold;
    }
    button {
      padding: 10px 15px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>📚 Bobba Bookshelf</h1>
  <p class="status" id="status">Cargando audios...</p>

  <div id="audioList"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxTMcW3VsJWSWRIKm0hQyHvFXa6xpDYQrgTvowdRAsInu1IaGkJ93f1OnoumHFmhGb2FA/exec";

    async function cargarAudios() {
      const status = document.getElementById('status');
      const list = document.getElementById('audioList');
      
      try {
        status.textContent = "Cargando audios desde Drive...";
        
        const response = await fetch(API_URL + '?action=getAudios');
        const data = await response.json();

        if (!data.success) {
          throw new Error(data.error || "Error desconocido");
        }

        list.innerHTML = '';

        if (data.audios.length === 0) {
          list.innerHTML = '<p>No hay audios en la carpeta.</p>';
          return;
        }

        data.audios.forEach(audio => {
          const div = document.createElement('div');
          div.className = 'audio-item';
          div.innerHTML = `
            <h3>${audio.title}</h3>
            <audio controls preload="metadata">
              <source src="${audio.directLink}" type="audio/mpeg">
              Tu navegador no soporta reproducción de audio.
            </audio>
            <small>Archivo: ${audio.name}</small>
          `;
          list.appendChild(div);
        });

        status.textContent = `✅ ${data.count} audios cargados`;

      } catch (error) {
        console.error(error);
        status.innerHTML = `❌ Error: ${error.message}<br><button onclick="cargarAudios()">Reintentar</button>`;
      }
    }

    // Cargar al abrir la página
    window.onload = cargarAudios;
  </script>
</body>
</html>
